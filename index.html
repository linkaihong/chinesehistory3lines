<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>广州中考 · 中国历史三线时间线</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&family=Noto+Serif+SC:wght@600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans SC',-apple-system,sans-serif;background:#faf9f6;color:#2c2c2c;-webkit-font-smoothing:antialiased}
.app{max-width:430px;margin:0 auto;min-height:100vh}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}

.hd{padding:54px 20px 20px;background:linear-gradient(165deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;top:-60px;right:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(228,165,65,.15),transparent 70%)}
.hd-sub{font-size:10px;color:rgba(255,255,255,.45);font-weight:500;letter-spacing:2px}
.hd-title{font-family:'Noto Serif SC',serif;font-size:26px;font-weight:900;margin-top:6px;line-height:1.25}
.hd-title span{color:#E4A541}
.hd-desc{font-size:12px;color:rgba(255,255,255,.5);margin-top:8px;line-height:1.5}
.legend{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600}
.legend-dot{width:10px;height:10px;border-radius:3px}

.periods{display:flex;gap:6px;padding:14px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.periods::-webkit-scrollbar{display:none}
.per-btn{padding:6px 14px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid #e0ddd6;font-family:inherit;background:#fff;color:#888;white-space:nowrap;transition:all .15s;flex-shrink:0}
.per-btn:active{transform:scale(.96)}
.per-btn.on{background:#1a1a2e;color:#fff;border-color:#1a1a2e}

.filters{display:flex;gap:0;padding:0 20px;margin-bottom:6px}
.fil{flex:1;text-align:center;padding:10px 0;font-size:12px;font-weight:700;cursor:pointer;border-bottom:2.5px solid transparent;color:#aaa;transition:all .15s}
.fil:active{opacity:.7}
.fil.on-all{color:#1a1a2e;border-color:#1a1a2e}
.fil.on-pol{color:#B74141;border-color:#B74141}
.fil.on-eco{color:#E4A541;border-color:#E4A541}
.fil.on-cul{color:#4A8FBA;border-color:#4A8FBA}

.stats{display:flex;gap:8px;padding:6px 20px 8px;font-size:10px;color:#aaa;font-weight:500}
.stat-num{font-weight:800;color:#666}

/* Period banner */
.pbanner{margin:6px 20px 10px;padding:9px 14px;border-radius:10px;font-size:11px;font-weight:600;line-height:1.55;display:flex;gap:8px;align-items:flex-start}
.pbanner .dot{width:8px;height:8px;border-radius:2px;margin-top:4px;flex-shrink:0}
.pbanner.pol{background:#B7414108;border-left:3px solid #B74141;color:#8a3030}
.pbanner.eco{background:#E4A54108;border-left:3px solid #E4A541;color:#8a6e20}
.pbanner.cul{background:#4A8FBA08;border-left:3px solid #4A8FBA;color:#2d6080}

.timeline{padding:0 20px 40px;position:relative}
.era{margin-bottom:20px}
.era-title{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:900;color:#1a1a2e;margin-bottom:8px;padding-left:2px;display:flex;align-items:center;gap:8px}
.era-line{flex:1;height:1px;background:linear-gradient(to right,#ddd,transparent)}

.evt{display:flex;gap:0;margin-bottom:4px;border-radius:12px;overflow:hidden;background:#fff;border:1px solid rgba(0,0,0,.04);transition:all .15s;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.02)}
.evt:active{transform:scale(.985)}
.evt.open{box-shadow:0 2px 12px rgba(0,0,0,.06);border-color:rgba(0,0,0,.08)}
.evt-bar{width:4px;flex-shrink:0}
.evt-bar.pol{background:#B74141}
.evt-bar.eco{background:#E4A541}
.evt-bar.cul{background:#4A8FBA}
.evt-body{flex:1;padding:11px 13px}
.evt-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.evt-year{font-size:10px;font-weight:800;font-variant-numeric:tabular-nums}
.evt-year.pol{color:#B74141}.evt-year.eco{color:#E4A541}.evt-year.cul{color:#4A8FBA}
.evt-cat{font-size:8px;font-weight:700;padding:1px 6px;border-radius:99px}
.evt-cat.pol{background:#B7414112;color:#B74141}.evt-cat.eco{background:#E4A54112;color:#E4A541}.evt-cat.cul{background:#4A8FBA12;color:#4A8FBA}
.evt-must{font-size:8px;font-weight:800;color:#D4380D;background:#D4380D10;padding:1px 5px;border-radius:4px}
.evt-name{font-size:13px;font-weight:700;margin-top:3px;line-height:1.35}
.evt-detail{display:none;margin-top:8px;animation:fi .25s}
.evt.open .evt-detail{display:block}
.evt-desc{font-size:11.5px;color:#777;line-height:1.75}
.evt-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px}
.evt-tag{font-size:9px;font-weight:600;padding:2px 8px;border-radius:99px;background:#f5f3ee;color:#888}
.evt-sig{font-size:10px;font-weight:600;margin-top:7px;padding:7px 10px;border-radius:8px;background:#faf8f3;color:#666;line-height:1.6}
.evt-sig b{color:#1a1a2e;font-weight:700}
.bottom{text-align:center;padding:0 20px 40px;font-size:10px;color:#ccc}
</style>
</head>

<div class="app" id="app"></div>
<script>
const DATA=[
// ============ 先秦 ============
{y:-2070,p:"约前2070",era:"先秦",cat:"pol",name:"夏朝建立",desc:"禹建立夏朝。禅让制→世袭制（\"家天下\"的开始）。这是中国历史上第一个奴隶制王朝。",tags:["禹","世袭制","奴隶制"],sig:"<b>意义</b>：标志着中国早期国家的产生，公天下变为家天下。",lv:2},
{y:-1600,p:"约前1600",era:"先秦",cat:"pol",name:"商朝建立",desc:"汤灭夏建商。盘庚迁殷。内外服制度。",tags:["商汤","盘庚迁殷"],sig:"",lv:1},
{y:-1600,p:"商代",era:"先秦",cat:"cul",name:"甲骨文·青铜器",desc:"甲骨文是中国已发现的古代文字中年代最早、体系较为完整的文字。商周青铜器代表：司母戊鼎（最重）、四羊方尊。",tags:["甲骨文","司母戊鼎","青铜文明"],sig:"<b>意义</b>：甲骨文是汉字的源头，证明了商朝的存在。青铜器代表了当时高超的铸造技术。",lv:2},
{y:-1046,p:"约前1046",era:"先秦",cat:"pol",name:"西周·分封制·宗法制",desc:"武王伐纣建西周。实行分封制：天子→诸侯→卿大夫→士。宗法制以嫡长子继承制为核心。礼乐制度维护等级秩序。",tags:["分封制","宗法制","嫡长子继承"],sig:"<b>意义</b>：分封制扩大了统治范围，但诸侯权力较大，后来导致诸侯割据。宗法制影响中国社会数千年。",lv:2},
{y:-770,p:"前770",era:"先秦",cat:"pol",name:"东周·春秋争霸·战国七雄",desc:"春秋五霸（齐桓公等）、战国七雄（齐楚燕韩赵魏秦）。诸侯争霸，分封制瓦解。各国变法（商鞅变法最彻底）。",tags:["春秋五霸","战国七雄","商鞅变法"],sig:"<b>意义</b>：商鞅变法使秦国强大，为统一六国奠定基础。分封制逐步被郡县制取代。",lv:2},
{y:-770,p:"春秋战国",era:"先秦",cat:"eco",name:"铁犁牛耕·小农经济形成",desc:"春秋时期铁农具和牛耕出现并推广。井田制瓦解，土地私有制逐渐确立。个体小农经济（男耕女织、自给自足）形成。",tags:["铁犁牛耕","小农经济","井田制瓦解"],sig:"<b>意义</b>：小农经济成为中国古代基本经济形态，延续两千多年直到近代。",lv:3},
{y:-770,p:"春秋战国",era:"先秦",cat:"eco",name:"商鞅变法中的经济措施",desc:"废井田开阡陌（承认土地私有）。奖励耕织。统一度量衡。重农抑商。",tags:["商鞅","土地私有","重农抑商"],sig:"<b>意义</b>：重农抑商成为后世封建王朝的基本经济政策。",lv:2},
{y:-551,p:"前551-前249",era:"先秦",cat:"cul",name:"百家争鸣",desc:"儒家孔子（仁/礼/有教无类）孟子（仁政/民贵君轻）荀子。道家老子（无为而治/辩证法）庄子。墨家墨子（兼爱非攻/节俭）。法家韩非子（法治/中央集权）。兵家孙武《孙子兵法》。",tags:["百家争鸣","孔子","老子","韩非子"],sig:"<b>意义</b>：中国历史上第一次思想解放运动。奠定了中国传统文化的基础。法家思想为秦统一提供了理论武器。",lv:3},

// ============ 秦汉 ============
{y:-221,p:"前221",era:"秦汉",cat:"pol",name:"秦统一·中央集权制确立",desc:"嬴政统一六国建秦。确立皇帝制度、三公九卿制、郡县制。全国统一行政体系。修筑长城防御匈奴。",tags:["皇帝制度","三公九卿","郡县制"],sig:"<b>意义</b>：开创了大一统的中央集权政治体制，影响中国两千多年。郡县制取代分封制是历史的进步。",lv:3},
{y:-221,p:"前221",era:"秦汉",cat:"eco",name:"秦统一经济措施",desc:"统一度量衡、货币（圆形方孔半两钱）、车轨。修驰道、直道。促进全国经济交流。",tags:["度量衡","半两钱","驰道"],sig:"<b>意义</b>：消除各地经济交流障碍，有利于国家统一和经济发展。",lv:2},
{y:-221,p:"前221",era:"秦汉",cat:"cul",name:"秦统一文字·焚书坑儒",desc:"以小篆为标准统一文字，后推行隶书。焚书坑儒钳制思想自由。",tags:["小篆","焚书坑儒"],sig:"<b>意义</b>：文字统一有利于文化交流和国家认同。焚书坑儒是思想文化专制的开端。",lv:2},
{y:-202,p:"前202",era:"秦汉",cat:"pol",name:"西汉建立·汉武帝大一统",desc:"刘邦建西汉。文景之治（休养生息/轻徭薄赋）。汉武帝大一统措施：政治上推恩令削弱诸侯；设刺史监察地方。",tags:["推恩令","刺史","大一统"],sig:"<b>意义</b>：推恩令巧妙解决了王国问题，加强了中央集权。",lv:2},
{y:-134,p:"前134",era:"秦汉",cat:"cul",name:"罢黜百家独尊儒术·太学",desc:"汉武帝采纳董仲舒建议。\"天人感应\"\"大一统\"学说。设太学以儒家五经为教材，儒学成为正统思想。",tags:["董仲舒","儒学正统","太学"],sig:"<b>意义</b>：儒学成为封建社会正统思想，影响中国两千多年。实现了思想上的大一统。",lv:3},
{y:-138,p:"前138",era:"秦汉",cat:"pol",name:"张骞出使西域·西域都护府",desc:"前138/前119年两次出使西域。前60年设西域都护府，新疆正式归属中央管辖。",tags:["张骞","西域都护府","新疆"],sig:"<b>意义</b>：沟通了东西方交通要道，西域正式纳入中国版图。",lv:3},
{y:-138,p:"前138",era:"秦汉",cat:"eco",name:"丝绸之路开辟",desc:"陆上丝绸之路：长安→河西走廊→西域→中亚→欧洲。丝绸、茶叶、瓷器西传；葡萄、核桃、良马东来。汉武帝还实行盐铁官营、均输平准。",tags:["丝绸之路","盐铁官营"],sig:"<b>意义</b>：成为古代东西方经济文化交流的重要通道。盐铁官营加强了国家对经济的控制。",lv:3},
{y:8,p:"8-25",era:"秦汉",cat:"pol",name:"新朝·东汉",desc:"王莽篡汉建新。刘秀建东汉（光武中兴）。东汉后期宦官与外戚交替专权，导致政局动荡。",tags:["王莽","光武中兴","外戚宦官"],sig:"",lv:1},
{y:105,p:"105",era:"秦汉",cat:"cul",name:"蔡伦改进造纸术",desc:"东汉蔡伦用树皮、麻头、破布等造纸（蔡侯纸）。此前西汉已有纸但质量差。",tags:["蔡伦","造纸术","四大发明"],sig:"<b>意义</b>：四大发明之一。促进人类文化传播，后经丝绸之路传向世界。",lv:2},
{y:132,p:"132",era:"秦汉",cat:"cul",name:"张仲景·华佗",desc:"张仲景《伤寒杂病论》（\"医圣\"）。华佗发明麻沸散（最早全身麻醉剂）、五禽戏。",tags:["张仲景","华佗","麻沸散"],sig:"<b>意义</b>：奠定了中医临床学的基础。",lv:1},

// ============ 三国两晋南北朝 ============
{y:208,p:"208",era:"魏晋",cat:"pol",name:"赤壁之战·三国鼎立",desc:"孙刘联军大败曹操。220年曹丕建魏，221年刘备建蜀汉，229年孙权建吴。诸葛亮治蜀。",tags:["赤壁之战","三国","以少胜多"],sig:"<b>意义</b>：以少胜多的经典战役。奠定三国鼎立格局。",lv:2},
{y:265,p:"265-589",era:"魏晋",cat:"pol",name:"西晋短暂统一·南北朝对峙",desc:"西晋统一（280年灭吴）但很快八王之乱、五胡内迁导致灭亡。东晋与十六国→南北朝对峙。北魏孝文帝改革（迁都洛阳、汉化政策）。",tags:["孝文帝改革","民族交融","南北朝"],sig:"<b>意义</b>：北魏孝文帝改革促进了民族交融，为隋唐统一奠定基础。",lv:2},
{y:265,p:"魏晋",era:"魏晋",cat:"eco",name:"经济重心开始南移",desc:"北方战乱，大量北人南迁（衣冠南渡）。带去先进生产技术和劳动力。江南地区得到初步开发。",tags:["北人南迁","江南开发"],sig:"<b>意义</b>：经济重心南移开始，为后来南方经济超过北方奠定基础。",lv:2},
{y:265,p:"魏晋",era:"魏晋",cat:"cul",name:"书法绘画·科技",desc:"书法：王羲之《兰亭集序》（\"书圣\"）。数学：祖冲之将圆周率精确到小数点后七位。农学：贾思勰《齐民要术》（现存最早农学著作）。",tags:["王羲之","祖冲之","齐民要术"],sig:"<b>意义</b>：文化艺术在动荡中仍有重大发展。",lv:2},

// ============ 隋唐 ============
{y:581,p:"581",era:"隋唐",cat:"pol",name:"隋统一·科举制创立",desc:"杨坚建隋，589年灭陈统一。隋炀帝设进士科，科举制正式创立。延续1300年。",tags:["隋文帝","科举制","进士科"],sig:"<b>意义</b>：科举制打破了门阀垄断，使有才学的人可以参与政治，是选官制度的重大进步。",lv:3},
{y:581,p:"隋代",era:"隋唐",cat:"eco",name:"隋朝大运河",desc:"隋炀帝开凿。以洛阳为中心，北达涿郡（北京），南至余杭（杭州）。分永济渠、通济渠、邗沟、江南河四段，全长两千多公里。",tags:["大运河","隋炀帝","南北交通"],sig:"<b>意义</b>：加强了南北经济文化交流，是古代世界最长的运河。但也加速了隋朝灭亡。",lv:3},
{y:618,p:"618",era:"隋唐",cat:"pol",name:"唐朝建立·三省六部制·贞观之治",desc:"李渊建唐都长安。完善三省六部制（中书→门下→尚书→六部），三省相互牵制分散相权。唐太宗贞观之治：虚心纳谏（魏征）、知人善任、减轻赋税。",tags:["三省六部","贞观之治","魏征"],sig:"<b>意义</b>：三省六部制分散了相权、加强了皇权。贞观之治奠定了唐朝盛世基础。",lv:2},
{y:618,p:"唐代",era:"隋唐",cat:"pol",name:"武则天·开元盛世",desc:"武则天（中国唯一女皇帝），大力发展科举。唐玄宗开元年间经济繁荣、国力强盛（开元盛世）。",tags:["武则天","开元盛世","唐玄宗"],sig:"<b>意义</b>：唐朝国力达到全盛，是当时世界上最强大的国家之一。",lv:2},
{y:618,p:"唐代",era:"隋唐",cat:"eco",name:"唐朝经济繁荣",desc:"农业：曲辕犁、筒车。手工业：唐三彩、越窑青瓷和邢窑白瓷（南青北白）。商业：长安百万人口，东市（贵族）西市（平民）。海外贸易：广州设市舶司（中国最早海关）。",tags:["曲辕犁","唐三彩","市舶司","坊市制"],sig:"<b>特点</b>：城市商业繁荣但仍有坊市限制（指定区域、定时交易）。小农经济仍是基础。",lv:2},
{y:618,p:"唐代",era:"隋唐",cat:"cul",name:"唐朝文化高峰",desc:"诗歌：李白（诗仙/浪漫主义）、杜甫（诗圣/现实主义）、白居易。书法：颜真卿、欧阳询。对外交流：玄奘西行天竺取经、鉴真东渡日本传播佛学。日本遣唐使。",tags:["唐诗","玄奘","鉴真","遣唐使"],sig:"<b>意义</b>：唐朝是中国古代文化最辉煌的时期，对东亚和世界文化影响深远。",lv:2},
{y:755,p:"755",era:"隋唐",cat:"pol",name:"安史之乱·藩镇割据",desc:"安禄山、史思明叛乱（755-763），唐朝由盛转衰。此后藩镇割据，中央权威削弱。",tags:["安史之乱","藩镇割据","由盛转衰"],sig:"<b>意义</b>：唐朝由盛转衰的转折点。说明了节度使权力过大的危害。",lv:2},

// ============ 宋元 ============
{y:960,p:"960",era:"宋元",cat:"pol",name:"北宋建立·重文轻武",desc:"赵匡胤陈桥兵变建宋都开封。杯酒释兵权，文臣统兵。设转运使管地方财政。重文轻武国策。",tags:["赵匡胤","重文轻武","杯酒释兵权"],sig:"<b>意义</b>：解决了武将专权问题，但导致军事力量薄弱（积弱），对外战争屡败。形成了\"冗官冗兵冗费\"的三冗问题。",lv:2},
{y:960,p:"宋代",era:"宋元",cat:"eco",name:"经济重心南移完成·商品经济繁荣",desc:"经济重心从黄河流域完全转移到长江流域（\"苏湖熟天下足\"）。出现交子（世界最早纸币）。景德镇成为瓷都。海外贸易发达：泉州、广州为大港，设市舶司。城市商业突破坊市限制：出现夜市、早市、草市。出现世界上最早的商业广告。",tags:["经济重心南移","交子","景德镇","坊市突破"],sig:"<b>意义</b>：经济重心南移完成是中国经济地理格局的重大变化。交子是世界上最早的纸币。商品经济发展突破了唐朝坊市制的限制。",lv:3},
{y:1040,p:"约1040",era:"宋元",cat:"cul",name:"活字印刷·指南针·火药",desc:"北宋毕昇发明胶泥活字印刷术。指南针开始应用于航海。火药广泛用于军事。宋词繁荣：苏轼（豪放派）、李清照（婉约派）。",tags:["毕昇","四大发明","指南针","宋词"],sig:"<b>意义</b>：三大发明经阿拉伯传入欧洲。印刷术→文艺复兴、宗教改革；指南针→新航路开辟；火药→摧毁封建城堡。对世界文明进步产生了重大推动作用。",lv:3},
{y:1069,p:"1069",era:"宋元",cat:"pol",name:"王安石变法",desc:"宋神宗时王安石变法。青苗法、募役法、方田均税法、农田水利法等。目的：富国强兵。",tags:["王安石","富国强兵"],sig:"<b>意义</b>：一定程度上改变了积贫积弱局面，但触犯了大地主大官僚利益，最终失败。",lv:1},
{y:1127,p:"1127",era:"宋元",cat:"pol",name:"南宋·岳飞抗金",desc:"金灭北宋（靖康之耻），赵构建南宋都临安（杭州）。岳飞抗金收复大片失地，但被秦桧以\"莫须有\"罪名害死。",tags:["靖康之耻","岳飞","南宋"],sig:"<b>意义</b>：岳飞是著名的民族英雄。南宋偏安导致中国长期南北分裂。",lv:2},
{y:1206,p:"1206",era:"宋元",cat:"pol",name:"蒙古统一·元朝·行省制",desc:"铁木真（成吉思汗）统一蒙古。忽必烈1271年建元，都大都（北京）。实行行省制度。设宣政院管辖西藏，设澎湖巡检司管辖台湾。",tags:["行省制","宣政院","澎湖巡检司"],sig:"<b>意义</b>：行省制度是中国省级行政区的开端。加强了中央对边疆的有效管辖。元朝疆域空前辽阔。",lv:3},
{y:1206,p:"元代",era:"宋元",cat:"eco",name:"元朝交通与贸易",desc:"大都成为国际大都市。陆路和海路贸易发达。马可波罗来华。开辟了新的漕运和海运航线。",tags:["马可波罗","大都","海运"],sig:"",lv:1},
{y:1206,p:"元代",era:"宋元",cat:"cul",name:"元曲·民族交融",desc:"元曲四大家：关汉卿《窦娥冤》、马致远等。元朝促进了各民族的交融（回族的形成）。",tags:["关汉卿","窦娥冤","民族交融"],sig:"<b>意义</b>：元朝是中国历史上民族交融的重要时期。",lv:1},

// ============ 明清 ============
{y:1368,p:"1368",era:"明清",cat:"pol",name:"明朝·废丞相·内阁·厂卫",desc:"朱元璋建明。废丞相、权分六部。后设内阁（辅助皇帝处理政务）。设锦衣卫、东厂、西厂特务机构监控百官和百姓。",tags:["废丞相","内阁","厂卫特务"],sig:"<b>意义</b>：废除丞相制度，皇权空前强化。是君主专制强化的表现。",lv:3},
{y:1368,p:"明代",era:"明清",cat:"cul",name:"八股取士",desc:"明朝科举考试以八股文为标准格式，考试范围限于四书五经，不允许有个人见解。",tags:["八股取士","思想禁锢"],sig:"<b>意义</b>：严重束缚了知识分子的思想，不利于社会进步和科技创新。是文化专制的表现。",lv:2},
{y:1368,p:"明代",era:"明清",cat:"eco",name:"明朝商品经济发展",desc:"商品经济进一步发展。出现了工商业市镇（如景德镇、松江、苏州/杭州纺织业）。明中后期江南地区出现\"机户出资、机工出力\"的资本主义萌芽。但仍以小农经济为主。",tags:["资本主义萌芽","机户机工","工商业市镇"],sig:"<b>意义</b>：资本主义萌芽出现，但受到封建制度（重农抑商、闭关锁国）的严重阻碍，发展缓慢。",lv:3},
{y:1405,p:"1405",era:"明清",cat:"eco",name:"郑和下西洋",desc:"明成祖派郑和七次下西洋（1405-1433），到达亚非30多个国家和地区，最远到达非洲东海岸和红海沿岸。船队规模空前（宝船长44丈）。",tags:["郑和","航海","亚非"],sig:"<b>意义</b>：是世界航海史上的壮举，比欧洲远航早半个多世纪。促进了中外友好往来。但以朝贡贸易为主，不以营利为目的，后因耗资巨大而停止。",lv:3},
{y:1405,p:"明代",era:"明清",cat:"cul",name:"明朝科技与文学",desc:"李时珍《本草纲目》（药物学巨著）。宋应星《天工开物》（\"中国17世纪工艺百科全书\"）。小说：施耐庵《水浒传》、罗贯中《三国演义》、吴承恩《西游记》。",tags:["本草纲目","天工开物","明代小说"],sig:"<b>意义</b>：科技总结性著作和长篇白话小说达到高峰。但科技已落后于同时期的西方。",lv:2},
{y:1636,p:"1636",era:"明清",cat:"pol",name:"清朝建立·军机处",desc:"皇太极改国号清。1644年清军入关定都北京。雍正设军机处：军机大臣跪受笔录，军国大事由皇帝一人裁决。",tags:["军机处","跪受笔录","皇权顶峰"],sig:"<b>意义</b>：军机处的设立标志着君主专制达到顶峰。",lv:3},
{y:1636,p:"清代",era:"明清",cat:"cul",name:"文字狱·文化专制",desc:"清朝大兴文字狱，从知识分子的文章诗词中摘取片段罗织罪名。《四库全书》编纂过程中销毁了大量\"违禁\"书籍。",tags:["文字狱","四库全书","思想禁锢"],sig:"<b>意义</b>：严重禁锢了思想，摧残了人才，阻碍了社会进步和学术发展。",lv:2},
{y:1636,p:"清代",era:"明清",cat:"pol",name:"清朝巩固统一多民族国家",desc:"平三藩、收复台湾（1662郑成功→1684设台湾府隶福建）、三征噶尔丹、设驻藏大臣（1727）、土尔扈特回归、设伊犁将军管新疆。",tags:["台湾府","驻藏大臣","伊犁将军"],sig:"<b>意义</b>：清朝前期巩固了统一多民族国家，奠定了中国辽阔版图的基础。",lv:2},
{y:1636,p:"清代",era:"明清",cat:"eco",name:"闭关锁国",desc:"清乾隆时实行闭关锁国政策，仅保留广州一口通商（十三行）。严格限制对外贸易。",tags:["闭关锁国","十三行","广州"],sig:"<b>意义</b>：使中国落后于世界发展潮流，是近代中国被动挨打的重要原因之一。",lv:3},
{y:1636,p:"清代",era:"明清",cat:"cul",name:"曹雪芹《红楼梦》",desc:"清代曹雪芹著。中国古典小说最高成就。揭示封建社会走向衰亡的命运。",tags:["红楼梦","曹雪芹","古典小说巅峰"],sig:"<b>意义</b>：中国古典小说的巅峰之作，世界文学名著。",lv:1},

// ============ 近代 ============
{y:1840,p:"1840",era:"近代",cat:"pol",name:"鸦片战争★近代史开端",desc:"英国发动。1842年签《南京条约》：割香港岛、赔2100万银元、五口通商（广州/厦门/福州/宁波/上海）、协定关税。",tags:["南京条约","割地赔款","五口通商"],sig:"<b>意义</b>：中国开始沦为半殖民地半封建社会，是中国近代史的开端。",lv:3},
{y:1840,p:"1840后",era:"近代",cat:"eco",name:"自然经济开始解体",desc:"鸦片战争后，外国商品大量涌入，洋纱洋布冲击手工纺织业。\"纺\"与\"织\"分离，\"织\"与\"耕\"分离。小农经济逐步解体但仍占主导。",tags:["自然经济解体","洋货倾销"],sig:"<b>意义</b>：中国被卷入资本主义世界市场，沦为原料产地和商品倾销市场。",lv:2},
{y:1851,p:"1851",era:"近代",cat:"pol",name:"太平天国运动",desc:"洪秀全领导（1851-1864）。定都天京。《天朝田亩制度》（平均土地/绝对平均/空想）。《资政新篇》（最早提出发展资本主义方案/未实施）。",tags:["洪秀全","天朝田亩制度","资政新篇"],sig:"<b>意义</b>：规模最大的农民起义，沉重打击了清王朝和外国侵略者。《资政新篇》有进步意义但脱离实际。",lv:2},
{y:1856,p:"1856",era:"近代",cat:"pol",name:"第二次鸦片战争",desc:"英法联军发动。1860年火烧圆明园。签《天津条约》《北京条约》：增开口岸、割九龙司。俄国趁机侵占150多万平方公里。",tags:["圆明园","北京条约","俄国领土"],sig:"<b>意义</b>：半殖民地化程度加深。",lv:2},
{y:1861,p:"1861-1895",era:"近代",cat:"eco",name:"洋务运动（中国近代化开端）",desc:"代表：曾国藩/李鸿章/左宗棠/张之洞。口号：自强（军事）→求富（民用）。军事工业：江南制造总局、福州船政局。民用工业：轮船招商局、开平煤矿、汉阳铁厂、湖北织布局。建新式学堂、派留学生、建北洋水师。",tags:["自强求富","江南制造总局","李鸿章"],sig:"<b>意义</b>：中国近代化的开端。引进了西方先进技术和培养人才，客观上刺激了民族资本主义的产生和发展。但只学技术不改制度（\"中体西用\"），不能使中国富强。甲午战败标志洋务运动失败。",lv:3},
{y:1861,p:"1860s后",era:"近代",cat:"eco",name:"民族资本主义产生",desc:"19世纪六七十年代，中国民族资本主义工业在东南沿海产生。代表：方举赞发昌机器厂、陈启源继昌隆缫丝厂。",tags:["民族资本主义","近代工业"],sig:"<b>意义</b>：近代民族工业的产生，为中国社会变革提供了经济基础和阶级力量。",lv:2},
{y:1894,p:"1894",era:"近代",cat:"pol",name:"甲午中日战争",desc:"1895年《马关条约》：割辽东半岛/台湾/澎湖列岛、赔2亿两白银、增开沙市/重庆/苏州/杭州四口、允许日本在通商口岸开设工厂。",tags:["马关条约","割台湾","开设工厂"],sig:"<b>意义</b>：大大加深了半殖民地化。\"允许设厂\"标志列强侵略方式从商品输出转为资本输出。刺激列强瓜分中国狂潮。",lv:3},
{y:1895,p:"1895后",era:"近代",cat:"eco",name:"民族资本主义初步发展",desc:"甲午战后清政府放宽对民间设厂限制。张謇\"实业救国\"创办大生纱厂。一战期间（1914-1918）帝国主义暂时放松侵略，民族工业出现\"短暂春天\"。",tags:["张謇","大生纱厂","短暂春天"],sig:"<b>意义</b>：民族资产阶级力量壮大，为维新变法和民主革命提供了社会基础。",lv:2},
{y:1898,p:"1898",era:"近代",cat:"pol",name:"戊戌变法（百日维新）",desc:"康有为梁启超发起。光绪帝支持，103天。政治：改革政府机构。经济：鼓励私人办工矿企业。文教：开办京师大学堂（北大前身）、废八股。军事：训练新军。以慈禧为首的顽固派发动政变，谭嗣同等六君子遇害。",tags:["百日维新","康梁","京师大学堂"],sig:"<b>意义</b>：是一次救亡图存的资产阶级改良运动。虽然失败，但在社会上起了思想启蒙的作用，有利于资产阶级思想的传播。",lv:2},
{y:1900,p:"1900",era:"近代",cat:"pol",name:"八国联军侵华·辛丑条约",desc:"1901年《辛丑条约》：赔4.5亿两白银（庚子赔款，本息共约10亿两）；划东交民巷为使馆界；拆毁大沽炮台；严禁中国人参加反帝活动；改总理衙门为外务部。",tags:["辛丑条约","庚子赔款","使馆界"],sig:"<b>意义</b>：中国完全沦为半殖民地半封建社会。清政府沦为\"洋人的朝廷\"，成为帝国主义统治中国的工具。",lv:3},
{y:1905,p:"1905",era:"近代",cat:"pol",name:"同盟会·三民主义",desc:"孙中山在日本东京成立同盟会（第一个全国性资产阶级革命政党）。纲领\"驱除鞑虏恢复中华创立民国平均地权\"概括为三民主义：民族、民权、民生。",tags:["同盟会","三民主义","孙中山"],sig:"<b>意义</b>：三民主义成为辛亥革命的指导思想。",lv:2},
{y:1905,p:"1905",era:"近代",cat:"cul",name:"废除科举·兴办新式学堂",desc:"1905年清政府废除延续1300多年的科举制度。各地兴办新式学堂，派遣留学生出国。",tags:["废科举","新式教育"],sig:"<b>意义</b>：结束了延续千年的科举制度，推动了教育和思想的近代化转型。",lv:2},
{y:1911,p:"1911.10.10",era:"近代",cat:"pol",name:"辛亥革命★",desc:"武昌起义。1912年元旦孙中山就任中华民国临时大总统。颁布《临时约法》（中国历史上第一部资产阶级共和国宪法性质的文件）。2月清帝退位，封建帝制终结。",tags:["武昌起义","临时约法","帝制终结"],sig:"<b>意义</b>：推翻清朝、结束两千多年封建帝制、使民主共和观念深入人心。但革命果实被袁世凯窃取，未改变半殖民地半封建社会性质。",lv:3},
{y:1915,p:"1915",era:"近代",cat:"cul",name:"新文化运动★",desc:"1915年陈独秀创办《新青年》杂志。口号：民主（德先生）科学（赛先生）。代表：陈独秀/李大钊/胡适/鲁迅。内容：提倡民主反对专制；提倡科学反对迷信；提倡新道德反对旧道德；提倡新文学反对旧文学（胡适白话文/鲁迅《狂人日记》）。后期传播马克思主义（李大钊）。",tags:["新青年","德赛先生","白话文","马克思主义"],sig:"<b>意义</b>：是一次伟大的思想解放运动。动摇了封建思想的统治地位，为马克思主义传播和五四运动创造了条件。",lv:3},
{y:1919,p:"1919.5.4",era:"近代",cat:"pol",name:"五四运动★新民主主义革命开端",desc:"导火索：巴黎和会中国外交失败。口号：外争主权内除国贼/废除二十一条/拒绝在和约上签字。前期以学生为主在北京，6月后中心转上海、工人阶级登上政治舞台。",tags:["巴黎和会","工人阶级","新民主主义"],sig:"<b>意义</b>：是一次彻底的反帝反封建的爱国运动。促进了马克思主义传播。工人阶级登上政治舞台，是新民主主义革命的开端。",lv:3},
{y:1921,p:"1921.7",era:"近代",cat:"pol",name:"中国共产党成立★",desc:"中共一大在上海召开（后转嘉兴南湖游船）。确定党的名称和奋斗目标（推翻资产阶级/建立无产阶级专政/实现共产主义）。选举陈独秀为中央局书记。",tags:["一大","上海","嘉兴南湖"],sig:"<b>意义</b>：开天辟地的大事。自从有了共产党，中国革命面貌焕然一新。",lv:3},
{y:1924,p:"1924",era:"近代",cat:"pol",name:"国共第一次合作·北伐战争",desc:"1924年国民党一大标志国共合作。创办黄埔军校（校长蒋介石/政治部主任周恩来）。1926年北伐讨伐吴佩孚/孙传芳/张作霖。1927年蒋介石/汪精卫发动反革命政变，国共合作破裂。",tags:["黄埔军校","北伐","国共合作"],sig:"<b>意义</b>：基本推翻了北洋军阀统治，但大革命因国民党右派叛变而失败。教训：必须掌握武装力量。",lv:2},
{y:1927,p:"1927.8-10",era:"近代",cat:"pol",name:"南昌起义·秋收起义·井冈山",desc:"8月1日南昌起义（周恩来/贺龙等）打响武装反抗第一枪。毛泽东领导秋收起义，进军井冈山创建第一个农村革命根据地。开辟\"农村包围城市，武装夺取政权\"的正确道路。1928年井冈山会师（朱毛红军）。",tags:["南昌起义","井冈山","农村包围城市"],sig:"<b>意义</b>：南昌起义是中共独立领导武装斗争和创建人民军队的开始。8月1日定为建军节。井冈山道路是马克思主义中国化的伟大创举。",lv:3},
{y:1931,p:"1931.9.18",era:"近代",cat:"pol",name:"九一八事变",desc:"日本制造柳条湖事件，炮轰北大营，侵占东北三省。蒋介石\"不抵抗政策\"。中国人民局部抗战开始。",tags:["九一八","不抵抗","局部抗战"],sig:"<b>意义</b>：中国人民的局部抗战开始，揭开了世界反法西斯战争的序幕。",lv:2},
{y:1934,p:"1934-1936",era:"近代",cat:"pol",name:"长征·遵义会议★",desc:"1934年10月第五次反围剿失败后红军被迫长征。1935年1月遵义会议：纠正\"左\"倾错误，确立以毛泽东为核心的党中央正确领导。四渡赤水/巧渡金沙江/飞夺泸定桥/爬雪山过草地。1936年10月三大主力会宁会师。",tags:["遵义会议","长征","生死攸关"],sig:"<b>意义</b>：遵义会议是党的历史上一个生死攸关的转折点。长征胜利保存了革命火种，铸就了长征精神。",lv:3},
{y:1936,p:"1936.12",era:"近代",cat:"pol",name:"西安事变",desc:"张学良杨虎城兵谏蒋介石。中共派周恩来等参与和平解决。",tags:["张学良","和平解决","统一战线"],sig:"<b>意义</b>：和平解决标志十年内战基本结束，促成了抗日民族统一战线的初步形成。",lv:2},
{y:1937,p:"1937.7.7",era:"近代",cat:"pol",name:"全面抗战爆发★",desc:"七七事变（卢沟桥事变）标志全面抗战开始。国共第二次合作建立抗日民族统一战线。正面战场：台儿庄大捷（李宗仁）。敌后战场：百团大战（彭德怀）。1937年12月南京大屠杀（30万同胞遇难）。中共七大（1945）确立毛泽东思想为党的指导思想。",tags:["七七事变","南京大屠杀","台儿庄","百团大战"],sig:"<b>意义</b>：1945年抗战胜利，是近代以来第一次取得完全胜利的民族解放战争，增强了民族自尊心和自信心。中国的国际地位得到提高。",lv:3},
{y:1946,p:"1946-1949",era:"近代",cat:"pol",name:"解放战争",desc:"1946年全面内战爆发。1947年刘邓大军挺进大别山（揭开战略进攻序幕）。三大战役：辽沈→淮海→平津（基本消灭国民党主力）。1949年4月渡江战役解放南京。",tags:["三大战役","渡江战役","刘邓大军"],sig:"<b>意义</b>：推翻了国民党反动统治，为新中国成立奠定了基础。",lv:2},
{y:1946,p:"解放战争期间",era:"近代",cat:"eco",name:"解放区土地改革",desc:"1947年颁布《中国土地法大纲》，在解放区实行土地改革。废除封建地主土地所有制，实行耕者有其田。",tags:["土地法大纲","耕者有其田"],sig:"<b>意义</b>：翻身农民踊跃参军参战，为解放战争胜利提供了重要的人力物力保障。",lv:1},

// ============ 现代 ============
{y:1949,p:"1949.10.1",era:"现代",cat:"pol",name:"新中国成立★",desc:"毛泽东在天安门宣告中华人民共和国中央人民政府成立。中国人民从此站起来了。",tags:["开国大典","站起来","新纪元"],sig:"<b>意义</b>：开辟了中国历史新纪元。中国真正成为独立自主的国家，人民成为国家的主人。壮大了世界和平民主和社会主义力量。",lv:3},
{y:1950,p:"1950-1952",era:"现代",cat:"eco",name:"土地改革",desc:"1950年颁布《中华人民共和国土地改革法》。到1952年底基本完成。约3亿无地少地农民分到土地。废除地主土地所有制→农民土地所有制。",tags:["土地改革","农民翻身"],sig:"<b>意义</b>：彻底废除了延续两千多年的封建土地制度，解放了农村生产力，为工业化准备了条件。",lv:2},
{y:1950,p:"1950-1953",era:"现代",cat:"pol",name:"抗美援朝",desc:"1950年10月中国人民志愿军入朝作战（司令员彭德怀）。1953年签订停战协定。英雄：黄继光/邱少云。",tags:["抗美援朝","彭德怀","停战协定"],sig:"<b>意义</b>：巩固了新生的人民政权，提高了中国国际地位，为国内经济建设赢得了和平环境。",lv:2},
{y:1953,p:"1953-1957",era:"现代",cat:"eco",name:"一五计划",desc:"优先发展重工业。鞍钢/长春一汽/沈阳机床厂/飞机制造厂。建武汉长江大桥、川藏/青藏/新藏公路。1957年超额完成。",tags:["一五计划","重工业","鞍钢"],sig:"<b>意义</b>：我国开始改变工业落后面貌，向社会主义工业化迈进。",lv:2},
{y:1954,p:"1954",era:"现代",cat:"pol",name:"第一届全国人大·第一部宪法",desc:"1954年召开第一届全国人民代表大会，通过《中华人民共和国宪法》。这是第一部社会主义类型宪法，确立了人民代表大会制度。",tags:["宪法","人民代表大会制度"],sig:"<b>意义</b>：以根本大法形式确定了国家根本政治制度。",lv:2},
{y:1956,p:"1953-1956",era:"现代",cat:"eco",name:"三大改造完成★",desc:"农业合作化、手工业合作化、资本主义工商业公私合营。1956年底基本完成。生产资料私有制→社会主义公有制。",tags:["三大改造","公私合营","社会主义"],sig:"<b>意义</b>：标志社会主义基本制度在中国建立。中国进入社会主义初级阶段。",lv:3},
{y:1958,p:"1958",era:"现代",cat:"eco",name:"大跃进·人民公社化",desc:"\"左\"倾错误：大跃进以钢为纲/浮夸风/高指标。人民公社\"一大二公\"/吃大锅饭。加上自然灾害和苏联撕毁合同，1959-1961年出现严重经济困难。",tags:["大跃进","人民公社","左倾错误"],sig:"<b>教训</b>：社会主义建设必须从国情出发，实事求是，遵循客观经济规律，不能急于求成。",lv:2},
{y:1964,p:"1964-1970",era:"现代",cat:"cul",name:"两弹一星",desc:"1964年第一颗原子弹。1966年导弹核武器。1967年第一颗氢弹。1970年东方红一号人造卫星。功臣：邓稼先（\"两弹元勋\"）/钱学森。",tags:["原子弹","氢弹","东方红","邓稼先"],sig:"<b>意义</b>：极大增强了国防实力和综合国力，提高了中国国际地位。",lv:2},
{y:1966,p:"1966-1976",era:"现代",cat:"pol",name:"文化大革命",desc:"十年内乱。经济遭严重损失，民主法制严重破坏，教育科学文化遭严重摧残。",tags:["文革","十年内乱"],sig:"<b>教训</b>：必须坚持以经济建设为中心，必须加强社会主义民主法制建设。",lv:2},
{y:1971,p:"1971",era:"现代",cat:"pol",name:"恢复联合国合法席位",desc:"第26届联大恢复中华人民共和国在联合国一切合法权利。",tags:["联合国"],sig:"<b>意义</b>：中国外交重大胜利。",lv:2},
{y:1972,p:"1972",era:"现代",cat:"pol",name:"中美关系正常化",desc:"尼克松访华签《中美联合公报》。1979年中美正式建交。中日1972年建交。",tags:["尼克松","中美建交","中日建交"],sig:"<b>意义</b>：打开了中国外交新局面。",lv:2},

// ============ 改革开放 ============
{y:1978,p:"1978.12",era:"改革",cat:"pol",name:"十一届三中全会★伟大转折",desc:"①思想路线：解放思想、实事求是。②政治决策：停止\"以阶级斗争为纲\"，工作重心转移到经济建设上来。③重大决策：实行改革开放。邓小平成为第二代领导核心。",tags:["改革开放","解放思想","伟大转折"],sig:"<b>意义</b>：是新中国成立以来党的历史上具有深远意义的伟大转折。开启了改革开放和社会主义现代化建设的伟大征程。形成了以邓小平为核心的领导集体。",lv:3},
{y:1978,p:"1978",era:"改革",cat:"eco",name:"农村改革·家庭联产承包责任制",desc:"安徽凤阳小岗村18户农民率先实行包产到户。\"交够国家的，留足集体的，剩下都是自己的\"。土地公有但承包到户，分户经营。后在全国推广。建立乡镇企业。",tags:["小岗村","包产到户","联产承包"],sig:"<b>意义</b>：极大调动了农民生产积极性，解放了农村生产力。是农村经济体制改革的伟大创举。",lv:3},
{y:1980,p:"1980",era:"改革",cat:"eco",name:"经济特区★",desc:"设立深圳/珠海/汕头/厦门四个经济特区。1988年设海南经济特区。深圳从小渔村发展为现代化大都市，成为对外开放的\"窗口\"。后形成：经济特区→沿海开放城市(14个)→沿海经济开放区→内地的全方位开放格局。",tags:["经济特区","深圳","全方位开放"],sig:"<b>意义</b>：经济特区是对外开放的前沿和窗口，引进外资和技术，为全国改革探索了经验。",lv:3},
{y:1984,p:"1984",era:"改革",cat:"eco",name:"城市经济体制改革",desc:"1984年起城市经济体制改革全面展开。中心环节：增强企业活力。国企改革：政企分开、扩大自主权。所有制改革：以公有制为主体、多种所有制经济共同发展。分配制度：以按劳分配为主体、多种分配方式并存。",tags:["国企改革","城市改革","企业活力"],sig:"<b>意义</b>：大大调动了企业和职工积极性，增强了企业活力。",lv:1},
{y:1992,p:"1992",era:"改革",cat:"eco",name:"邓小平南方谈话·市场经济体制★",desc:"邓小平南方谈话核心：发展才是硬道理。特区姓\"社\"不姓\"资\"。计划和市场都是经济手段。\"三个有利于\"标准。中共十四大确立建立社会主义市场经济体制的目标。",tags:["南方谈话","市场经济","硬道理"],sig:"<b>意义</b>：进一步解放了思想，推动改革开放和现代化建设进入新阶段。社会主义市场经济体制逐步建立。",lv:3},
{y:1992,p:"1992后",era:"改革",cat:"cul",name:"教育与科技发展",desc:"实施\"科教兴国\"战略。普及九年义务教育。211工程/985工程。2003年神舟五号（杨利伟）载人航天成功。袁隆平杂交水稻。",tags:["科教兴国","神舟五号","杨利伟"],sig:"<b>意义</b>：科技和教育水平大幅提升，综合国力显著增强。",lv:1},
{y:1997,p:"1997.7.1",era:"改革",cat:"pol",name:"香港回归★",desc:"中国恢复对香港行使主权。\"一国两制\"伟大构想成功实践。1999年12月20日澳门回归。",tags:["一国两制","香港","澳门"],sig:"<b>意义</b>：一国两制从构想变为现实。洗雪了百年国耻。标志着祖国统一大业迈出重要一步。",lv:3},
{y:2001,p:"2001.12",era:"改革",cat:"eco",name:"加入WTO",desc:"中国正式加入世界贸易组织（WTO）。",tags:["WTO","全球化","对外开放"],sig:"<b>意义</b>：标志着中国对外开放进入一个新阶段。全面融入经济全球化进程，推动了中国经济的快速发展。",lv:2},
{y:2012,p:"2012",era:"改革",cat:"pol",name:"十八大·中国特色社会主义新时代",desc:"提出\"两个一百年\"奋斗目标和中华民族伟大复兴的中国梦。全面深化改革。全面从严治党。",tags:["新时代","中国梦","两个一百年"],sig:"<b>意义</b>：中国特色社会主义进入新时代。主要矛盾转化为人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾。",lv:2},
{y:2020,p:"2020",era:"改革",cat:"eco",name:"脱贫攻坚·全面建成小康社会",desc:"现行标准下9899万农村贫困人口全部脱贫，832个贫困县全部摘帽。全面建成小康社会，实现第一个百年奋斗目标。",tags:["脱贫攻坚","全面小康","第一个百年"],sig:"<b>意义</b>：完成了消除绝对贫困的艰巨任务，创造了人类减贫史上的奇迹。",lv:2},
];

const ERAS=["全部","先秦","秦汉","魏晋","隋唐","宋元","明清","近代","现代","改革"];
const CAT_LABELS={pol:"政治",eco:"经济",cul:"文化"};
let curEra="全部",curCat="all",openItems=new Set();

function getFiltered(){
  let d=DATA;
  if(curEra!=="全部") d=d.filter(x=>x.era===curEra);
  if(curCat!=="all") d=d.filter(x=>x.cat===curCat);
  return d;
}

function render(){
  const items=getFiltered();
  const polC=items.filter(x=>x.cat==='pol').length;
  const ecoC=items.filter(x=>x.cat==='eco').length;
  const culC=items.filter(x=>x.cat==='cul').length;

  const grouped={};
  items.forEach(x=>{if(!grouped[x.era])grouped[x.era]=[];grouped[x.era].push(x)});
  const eraOrder=["先秦","秦汉","魏晋","隋唐","宋元","明清","近代","现代","改革"];
  const eraEmoji={先秦:"🏺",秦汉:"🏛️",魏晋:"🎋",隋唐:"🌸",宋元:"🏮",明清:"⛵",近代:"⚔️",现代:"🏗️",改革:"🚀"};

  let timeline='';
  eraOrder.forEach(era=>{
    if(!grouped[era])return;
    // Period banners
    let banners='';
    if(PBANNERS[era]){
      const bs=curCat==='all'?PBANNERS[era]:PBANNERS[era].filter(b=>b.cat===curCat);
      banners=bs.map(b=>`<div class="pbanner ${b.cat}"><div class="dot" style="background:${b.cat==='pol'?'#B74141':b.cat==='eco'?'#E4A541':'#4A8FBA'}"></div><div>${b.text}</div></div>`).join('');
    }
    timeline+=`<div class="era"><div class="era-title">${eraEmoji[era]||''} ${era}${era==='改革'?'开放':''}${['先秦','秦汉','魏晋','隋唐','宋元','明清'].includes(era)?'时期':era==='近代'||era==='现代'?'史':''}<div class="era-line"></div></div>${banners}`;
    grouped[era].forEach(ev=>{
      const id=ev.p+ev.name,o=openItems.has(id);
      timeline+=`<div class="evt ${o?'open':''}" data-toggle="${id}"><div class="evt-bar ${ev.cat}"></div><div class="evt-body"><div class="evt-top"><span class="evt-year ${ev.cat}">${ev.p}</span><span class="evt-cat ${ev.cat}">${CAT_LABELS[ev.cat]}</span>${ev.lv===3?'<span class="evt-must">★必考</span>':''}</div><div class="evt-name">${ev.name}</div><div class="evt-detail"><div class="evt-desc">${ev.desc}</div>${ev.sig?`<div class="evt-sig">${ev.sig}</div>`:''}<div class="evt-tags">${ev.tags.map(t=>`<span class="evt-tag">${t}</span>`).join('')}</div></div></div></div>`;
    });
    timeline+=`</div>`;
  });

  document.getElementById('app').innerHTML=`
    <div class="hd"><div class="hd-sub">广州中考 · 历史必备</div><div class="hd-title">中国历史<span>三线</span>时间线</div><div class="hd-desc">政治 · 经济 · 文化 三条线索并行<br>覆盖 ${DATA.length} 个考点 · 每个时期标注宏观脉络</div><div class="legend"><div class="legend-item"><div class="legend-dot" style="background:#B74141"></div><span style="color:rgba(255,255,255,.7)">政治线</span></div><div class="legend-item"><div class="legend-dot" style="background:#E4A541"></div><span style="color:rgba(255,255,255,.7)">经济线</span></div><div class="legend-item"><div class="legend-dot" style="background:#4A8FBA"></div><span style="color:rgba(255,255,255,.7)">文化线</span></div></div></div>
    <div class="periods">${ERAS.map(e=>`<button class="per-btn ${curEra===e?'on':''}" data-era="${e}">${e}${e==='改革'?'开放':''}</button>`).join('')}</div>
    <div class="filters"><div class="fil ${curCat==='all'?'on-all':''}" data-cat="all">全部</div><div class="fil ${curCat==='pol'?'on-pol':''}" data-cat="pol">🔴 政治</div><div class="fil ${curCat==='eco'?'on-eco':''}" data-cat="eco">🟡 经济</div><div class="fil ${curCat==='cul'?'on-cul':''}" data-cat="cul">🔵 文化</div></div>
    <div class="stats"><span>共 <span class="stat-num">${items.length}</span> 事件</span><span>政治 <span class="stat-num">${polC}</span></span><span>经济 <span class="stat-num">${ecoC}</span></span><span>文化 <span class="stat-num">${culC}</span></span></div>
    <div class="timeline">${timeline}</div>
    <div class="bottom">广州中考历史 · 政治经济文化三线梳理 · ${DATA.length}个考点</div>`;
  bindEvents();
}
function bindEvents(){
  document.querySelectorAll('[data-era]').forEach(el=>el.onclick=function(){curEra=this.dataset.era;render()});
  document.querySelectorAll('[data-cat]').forEach(el=>el.onclick=function(){curCat=this.dataset.cat;render()});
  document.querySelectorAll('[data-toggle]').forEach(el=>el.onclick=function(){const id=this.dataset.toggle;if(openItems.has(id))openItems.delete(id);else openItems.add(id);this.classList.toggle('open')});
}
render();
</script>
</body>
</html>
